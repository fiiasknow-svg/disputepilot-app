name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Prepare local Playwright auth state
        shell: bash
        env:
          AUTH_ORIGINAL_JSON: ${{ secrets.AUTH_ORIGINAL_JSON }}
        run: |
          if [ -z "$AUTH_ORIGINAL_JSON" ]; then
            echo "::error::Missing AUTH_ORIGINAL_JSON repository secret. The tracked parity tests need the local auth-original.json Playwright storage state."
            exit 1
          fi
          printf '%s' "$AUTH_ORIGINAL_JSON" > auth-original.json

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --config=playwright.config.ts

name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate CI environment
        shell: bash
        env:
          AUTH_ORIGINAL_JSON: ${{ secrets.AUTH_ORIGINAL_JSON }}
        run: |
          missing=0
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::Missing NEXT_PUBLIC_SUPABASE_URL repository variable or secret. Browser Supabase tests need it to create /rest/v1 requests."
            missing=1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing NEXT_PUBLIC_SUPABASE_ANON_KEY repository variable or secret. Browser Supabase tests need it to create /rest/v1 requests."
            missing=1
          fi
          if [ -z "$AUTH_ORIGINAL_JSON" ]; then
            echo "::error::Missing AUTH_ORIGINAL_JSON repository secret. The tracked parity tests need the local auth-original.json Playwright storage state."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Prepare local Playwright auth state
        shell: bash
        env:
          AUTH_ORIGINAL_JSON: ${{ secrets.AUTH_ORIGINAL_JSON }}
        run: |
          printf '%s' "$AUTH_ORIGINAL_JSON" > auth-original.json

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --config=playwright.config.ts
